<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="燃脂60天">
<title>🔥 燃脂60天</title>
<style>
:root{--bg:#0a0a0a;--card:#111;--border:#1a1a1a;--green:#00e09e;--blue:#00b4d8;--red:#ff6b6b;--dim:#555;--text:#e8e8e8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px);-webkit-font-smoothing:antialiased}
.header{padding:24px 20px 8px;text-align:center}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:12px;color:#666;margin-top:4px;font-weight:500;letter-spacing:1px}
.nav{display:flex;gap:4px;padding:8px 16px;margin-bottom:4px}
.nav button{flex:1;padding:10px 0;border:none;border-radius:10px;background:transparent;color:#666;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.nav button.active{background:var(--card);color:var(--green);box-shadow:0 0 0 1px #222}
.content{padding:0 16px}
.card{background:var(--card);border-radius:16px;padding:18px 16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#ccc}
.card-row{display:flex;justify-content:space-between;align-items:center}
.big-num{font-size:40px;font-weight:800;color:#fff;font-family:monospace;line-height:1}
.dim{font-size:11px;color:var(--dim);margin-top:4px;font-weight:500}
.progress-bg{background:var(--border);border-radius:6px;height:8px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .5s ease;background:linear-gradient(90deg,var(--green),var(--blue))}
.progress-label{font-size:11px;color:var(--dim);margin-top:6px;text-align:center}
.stat-box{text-align:center;flex:1}
.stat-num{font-size:20px;font-weight:800;color:#fff;font-family:monospace}
.check-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.check-label{font-size:14px;font-weight:500}
.check-btn{padding:8px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;min-width:80px}
.check-on{background:var(--green);color:#000}
.check-off{background:var(--border);color:var(--dim);border:1px solid #333}
.input-row{display:flex;gap:8px;margin-top:12px}
.input-row input{flex:1;background:var(--border);border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:16px;font-weight:600;outline:none;font-family:monospace}
.save-btn{background:linear-gradient(135deg,var(--green),var(--blue));border:none;border-radius:10px;padding:12px 20px;color:#000;font-size:14px;font-weight:700;cursor:pointer}
.saved-hint{font-size:12px;color:var(--green);margin-top:8px;font-weight:500}
.rule-box{background:#0d0d0d;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--border)}
.rule-title{font-size:13px;font-weight:700;color:#aaa;margin-bottom:6px}
.rule-text{font-size:12px;color:#666;line-height:1.8}
textarea{width:100%;background:var(--border);border:1px solid #333;border-radius:10px;padding:10px 12px;color:#ccc;font-size:13px;resize:none;outline:none;font-family:inherit}
.empty-chart{text-align:center;color:#444;font-size:13px;padding:30px 0}
.hist-list{max-height:400px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-date{font-size:13px;font-weight:600}
.hist-day{font-size:10px;color:var(--dim);margin-left:6px;font-family:monospace}
.hist-icons{display:flex;gap:10px;align-items:center}
.hist-weight{font-size:13px;font-weight:700;color:var(--green);font-family:monospace;min-width:50px;text-align:right}
.hist-none{font-size:13px;color:#333;min-width:50px;text-align:right}
.hist-good{font-size:13px}
.hist-bad{font-size:13px;opacity:.3}
.quote{text-align:center;padding:16px 20px;font-size:13px;color:var(--dim);font-weight:500;font-style:italic}
.reset-btn{width:100%;padding:12px;background:transparent;border:1px solid #2a1515;border-radius:10px;color:#663333;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid #333;color:var(--green);padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}
.chart-svg{width:100%;max-width:380px;display:block;margin:0 auto}
</style>
</head>
<body>

<div id="toast" class="toast hide"></div>

<div class="header">
  <div class="logo">🔥 燃脂60天</div>
  <div class="header-sub">Roy · 81kg → 70kg</div>
</div>

<div class="nav">
  <button id="tab-home" class="active" onclick="switchView('home')">首页</button>
  <button id="tab-log" onclick="switchView('log')">记录</button>
  <button id="tab-history" onclick="switchView('history')">历史</button>
</div>

<div class="content" id="view-home"></div>
<div class="content" id="view-log" style="display:none"></div>
<div class="content" id="view-history" style="display:none"></div>

<script>
const START_DATE="2026-04-02",END_DATE="2026-06-01",START_WEIGHT=81,TARGET_WEIGHT=70,TOTAL_DAYS=60,STORAGE_KEY="burn60_data";

function getToday(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function daysBetween(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5)}
function formatDate(ds){const d=new Date(ds+"T00:00:00");return `${d.getMonth()+1}月${d.getDate()}日`}
function dayIndex(ds){return daysBetween(START_DATE,ds)}

// data
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")}catch{return{}}}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
let data=loadData();

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hide");setTimeout(()=>t.classList.add("hide"),1800)}

function saveDayField(date,field,value){
  if(!data[date])data[date]={};
  data[date][field]=value;
  saveData(data);
  showToast("已保存 ✓");
  render();
}

function toggleField(date,field){
  const cur=data[date]&&data[date][field];
  saveDayField(date,field,!cur);
}

function getStreak(){
  let streak=0,d=new Date(getToday()+"T00:00:00");
  while(true){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const e=data[ds];
    if(e&&(e.diet||e.exercise)){streak++;d.setDate(d.getDate()-1);if(ds===START_DATE)break}else break;
  }
  return streak;
}

function latestWeight(){
  const entries=Object.entries(data).filter(([,v])=>v.weight).sort((a,b)=>b[0].localeCompare(a[0]));
  return entries.length>0?entries[0][1].weight:START_WEIGHT;
}

function buildChart(){
  const entries=Object.entries(data).filter(([,v])=>v.weight).map(([k,v])=>({day:dayIndex(k),weight:v.weight})).sort((a,b)=>a.day-b.day);
  if(entries.length<1)return'<div class="empty-chart">暂无体重数据，快去记录吧 📊</div>';
  const W=340,H=180,P=38;
  const weights=entries.map(e=>e.weight);
  const minW=Math.min(...weights,TARGET_WEIGHT)-1,maxW=Math.max(...weights,START_WEIGHT)+1;
  const xS=d=>P+(d/TOTAL_DAYS)*(W-P*2),yS=w=>P+((maxW-w)/(maxW-minW))*(H-P*2);
  let svg=`<svg viewBox="0 0 ${W} ${H}" class="chart-svg"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e09e" stop-opacity="0.3"/><stop offset="100%" stop-color="#00e09e" stop-opacity="0.02"/></linearGradient></defs>`;
  // y grid
  for(let w=Math.ceil(minW);w<=Math.floor(maxW);w+=2){
    svg+=`<line x1="${P}" y1="${yS(w)}" x2="${W-P}" y2="${yS(w)}" stroke="#333" stroke-width="0.5"/>`;
    svg+=`<text x="${P-4}" y="${yS(w)+3}" text-anchor="end" fill="#888" font-size="9" font-family="monospace">${w}</text>`;
  }
  // target
  const tY=yS(TARGET_WEIGHT);
  svg+=`<line x1="${P}" y1="${tY}" x2="${W-P}" y2="${tY}" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 3"/>`;
  svg+=`<text x="${W-P+2}" y="${tY+3}" fill="#ff6b6b" font-size="8" font-family="monospace">目标${TARGET_WEIGHT}</text>`;
  // area + line
  if(entries.length>1){
    const pts=entries.map(e=>`${xS(e.day)},${yS(e.weight)}`).join(" ");
    const area=`${xS(entries[0].day)},${H-P} ${pts} ${xS(entries[entries.length-1].day)},${H-P}`;
    svg+=`<polygon points="${area}" fill="url(#ag)"/>`;
    svg+=`<polyline points="${pts}" fill="none" stroke="#00e09e" stroke-width="2" stroke-linejoin="round"/>`;
  }
  // dots
  entries.forEach(e=>{
    svg+=`<circle cx="${xS(e.day)}" cy="${yS(e.weight)}" r="4" fill="#0a0a0a" stroke="#00e09e" stroke-width="2"/>`;
    svg+=`<text x="${xS(e.day)}" y="${yS(e.weight)-8}" text-anchor="middle" fill="#ddd" font-size="8" font-weight="600" font-family="monospace">${e.weight}</text>`;
  });
  svg+=`<text x="${P}" y="${H-8}" fill="#666" font-size="8" font-family="monospace">${formatDate(START_DATE)}</text>`;
  svg+=`<text x="${W-P}" y="${H-8}" text-anchor="end" fill="#666" font-size="8" font-family="monospace">${formatDate(END_DATE)}</text>`;
  svg+='</svg>';
  return svg;
}

// views
let currentView="home";
function switchView(v){
  currentView=v;
  ["home","log","history"].forEach(x=>{
    document.getElementById("view-"+x).style.display=x===v?"block":"none";
    document.getElementById("tab-"+x).classList.toggle("active",x===v);
  });
  render();
}

function render(){
  const td=getToday(),todayData=data[td]||{};
  const elapsed=Math.max(0,daysBetween(START_DATE,td));
  const left=Math.max(0,daysBetween(td,END_DATE));
  const pct=Math.min(100,Math.round((elapsed/TOTAL_DAYS)*100));
  const lw=latestWeight(),lost=START_WEIGHT-lw,toGo=lw-TARGET_WEIGHT;
  const streak=getStreak();

  // HOME
  if(currentView==="home"){
    let quote=left>50?"刚开始最难，撑过前两周就赢了一半 🚀":left>30?"坚持了这么久，别浪费之前的努力 💪":left>10?"冲刺阶段！终点就在前方 🏁":left>0?"最后几天，咬牙坚持到底！🔥":"挑战完成！你做到了 🎉";
    document.getElementById("view-home").innerHTML=`
      <div class="card">
        <div class="card-row"><div><div class="big-num">${left}</div><div class="dim">剩余天数</div></div><div style="text-align:right"><div class="big-num">${streak}</div><div class="dim">连续打卡</div></div></div>
        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${pct}% 已完成 · 第 ${elapsed}/${TOTAL_DAYS} 天</div>
      </div>
      <div class="card">
        <div class="card-title">📉 体重趋势</div>
        ${buildChart()}
        <div class="card-row" style="margin-top:12px">
          <div class="stat-box"><div class="stat-num" style="color:${lost>0?"var(--green)":"var(--red)"}">${lost>0?"-":"+"}${Math.abs(lost).toFixed(1)}kg</div><div class="dim">已减</div></div>
          <div class="stat-box"><div class="stat-num">${lw}kg</div><div class="dim">当前</div></div>
          <div class="stat-box"><div class="stat-num" style="color:var(--red)">${toGo.toFixed(1)}kg</div><div class="dim">距目标</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📋 今日打卡</div>
        <div class="check-row"><span class="check-label">🍚 饮食达标</span><button class="check-btn ${todayData.diet?"check-on":"check-off"}" onclick="toggleField('${td}','diet')">${todayData.diet?"✓":"✗"}</button></div>
        <div class="check-row"><span class="check-label">💪 运动完成</span><button class="check-btn ${todayData.exercise?"check-on":"check-off"}" onclick="toggleField('${td}','exercise')">${todayData.exercise?"✓":"✗"}</button></div>
      </div>
      <div class="quote">${quote}</div>`;
  }

  // LOG
  if(currentView==="log"){
    document.getElementById("view-log").innerHTML=`
      <div class="card">
        <div class="card-title">⚖️ 记录体重</div>
        <div class="dim">建议每天早上空腹称重</div>
        <div class="input-row">
          <input type="number" step="0.1" placeholder="输入体重 (kg)" id="weight-input" value="${todayData.weight||""}" />
          <button class="save-btn" onclick="saveWeight()">保存</button>
        </div>
        ${todayData.weight?`<div class="saved-hint">今日已记录: ${todayData.weight}kg ✓</div>`:""}
      </div>
      <div class="card">
        <div class="card-title">📋 今日打卡</div>
        <div class="rule-box">
          <div class="rule-title">🍚 饮食规则</div>
          <div class="rule-text">· 米饭半碗（拳头大小的一半）</div>
          <div class="rule-text">· 每餐必须有蛋白质（鸡蛋/肉/鱼/豆腐）</div>
          <div class="rule-text">· 面包、面条、零食、饮料、酒 = 禁止</div>
          <div class="rule-text">· 外卖只能点汤饭/家常菜类</div>
          <div class="rule-text">· 晚7点后只喝水或茶</div>
        </div>
        <div class="check-row"><span class="check-label">今天饮食达标了吗？</span><button class="check-btn ${todayData.diet?"check-on":"check-off"}" onclick="toggleField('${td}','diet')">${todayData.diet?"✓ 达标":"✗ 未达标"}</button></div>
        <div class="rule-box" style="margin-top:16px">
          <div class="rule-title">💪 运动规则</div>
          <div class="rule-text">· 快走/爬坡 30分钟</div>
          <div class="rule-text">· 深蹲+俯卧撑+平板支撑 各3组</div>
          <div class="rule-text">· 每周至少5天</div>
        </div>
        <div class="check-row"><span class="check-label">今天运动完成了吗？</span><button class="check-btn ${todayData.exercise?"check-on":"check-off"}" onclick="toggleField('${td}','exercise')">${todayData.exercise?"✓ 完成":"✗ 未完成"}</button></div>
      </div>
      <div class="card">
        <div class="card-title">📝 备注</div>
        <textarea id="memo-input" placeholder="今天吃了什么？状态如何？" rows="3" onblur="saveMemo()">${todayData.memo||""}</textarea>
      </div>`;
  }

  // HISTORY
  if(currentView==="history"){
    const days=Math.min(elapsed+1,TOTAL_DAYS);
    let histHtml="";
    for(let i=0;i<days;i++){
      const d=new Date(START_DATE+"T00:00:00");
      d.setDate(d.getDate()+(elapsed-i));
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const e=data[ds]||{},isT=ds===td;
      histHtml+=`<div class="hist-item">
        <div class="hist-date">${isT?"今天":formatDate(ds)}<span class="hist-day">D${dayIndex(ds)+1}</span></div>
        <div class="hist-icons">
          ${e.weight?`<span class="hist-weight">${e.weight}kg</span>`:'<span class="hist-none">--</span>'}
          <span class="${e.diet?"hist-good":"hist-bad"}">${e.diet?"🍚✓":"🍚✗"}</span>
          <span class="${e.exercise?"hist-good":"hist-bad"}">${e.exercise?"💪✓":"💪✗"}</span>
        </div>
      </div>`;
    }
    const dietDays=Object.values(data).filter(v=>v.diet).length;
    const exDays=Object.values(data).filter(v=>v.exercise).length;
    const wDays=Object.values(data).filter(v=>v.weight).length;

    document.getElementById("view-history").innerHTML=`
      <div class="card"><div class="card-title">📅 历史记录</div><div class="hist-list">${histHtml}</div></div>
      <div class="card">
        <div class="card-title">📊 统计</div>
        <div class="card-row"><div class="stat-box"><div class="stat-num">${dietDays}</div><div class="dim">饮食达标天数</div></div><div class="stat-box"><div class="stat-num">${exDays}</div><div class="dim">运动完成天数</div></div></div>
        <div class="card-row" style="margin-top:12px"><div class="stat-box"><div class="stat-num">${wDays}</div><div class="dim">体重记录次数</div></div><div class="stat-box"><div class="stat-num">${streak}</div><div class="dim">当前连续打卡</div></div></div>
      </div>
      <button class="reset-btn" onclick="resetAll()">🗑 重置所有数据</button>`;
  }
}

function saveWeight(){
  const v=parseFloat(document.getElementById("weight-input").value);
  if(v>40&&v<150){saveDayField(getToday(),"weight",v)}else{showToast("请输入有效体重")}
}
function saveMemo(){
  const v=document.getElementById("memo-input").value;
  if(!data[getToday()])data[getToday()]={};
  data[getToday()].memo=v;
  saveData(data);
}
function resetAll(){if(confirm("确定要清除所有数据吗？此操作不可恢复。")){data={};saveData(data);showToast("已重置");render()}}

render();
</script>
</body>
</html>
