<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="燃脂挑战">
<title>🔥 燃脂挑战</title>
<style>
:root{--cy:#00fff2;--mg:#ff00ff;--ny:#f0ff00;--np:#ff2d7b;--eb:#0080ff;--nv:#bf00ff;--bg:#06060e;--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--gborder:rgba(255,255,255,0.08);--gborder2:rgba(255,255,255,0.12);--dim:#556;--txt:#d8dce8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:420px;margin:0 auto;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));-webkit-font-smoothing:antialiased;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,255,242,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,0,255,.03) 0%,transparent 50%)}
/* glass card */
.gc{background:var(--glass);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--gborder);box-shadow:0 0 20px rgba(0,0,0,.3)}
.gc2{background:var(--glass2);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--gborder2)}
/* neon glow */
.glow-cy{text-shadow:0 0 8px rgba(0,255,242,.5)}
.glow-mg{text-shadow:0 0 8px rgba(255,0,255,.5)}
.glow-ny{text-shadow:0 0 8px rgba(240,255,0,.5)}
.glow-np{text-shadow:0 0 8px rgba(255,45,123,.5)}
.glow-eb{text-shadow:0 0 8px rgba(0,128,255,.5)}
.glow-nv{text-shadow:0 0 8px rgba(191,0,255,.5)}
/* setup */
.setup{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 24px}
.setup-logo{text-align:center;font-size:48px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(0,255,242,.4))}
.setup-title{text-align:center;font-size:28px;font-weight:800;color:var(--cy);margin-bottom:4px;text-shadow:0 0 20px rgba(0,255,242,.4)}
.setup-sub{text-align:center;font-size:13px;color:var(--dim);margin-bottom:32px}
.sf{margin-bottom:18px}
.sl{font-size:11px;color:#889;font-weight:600;margin-bottom:5px;display:block}
.si{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--gborder2);border-radius:12px;padding:13px 16px;color:#fff;font-size:17px;font-weight:700;outline:none;font-family:monospace;text-align:center;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.si:focus{border-color:var(--cy);box-shadow:0 0 12px rgba(0,255,242,.2)}
.si::placeholder{color:#334;font-weight:400}
.sr{display:flex;gap:10px}.sr .sf{flex:1}
.su{font-size:10px;color:#556;text-align:center;margin-top:3px}
.sbtn{width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:12px;background:linear-gradient(135deg,var(--cy),var(--eb));color:#000;box-shadow:0 0 30px rgba(0,255,242,.3);transition:transform .1s}
.sbtn:active{transform:scale(.96)}
.shint{text-align:center;font-size:10px;color:#445;margin-top:16px;line-height:1.6}
/* header */
.hdr{padding:14px 16px 2px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:17px;font-weight:800;color:var(--cy);text-shadow:0 0 15px rgba(0,255,242,.4)}
.hdr-r{display:flex;gap:6px;align-items:center}
.lang-btn{background:var(--glass);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid var(--gborder);border-radius:8px;padding:4px 8px;color:#889;font-size:9px;font-weight:600;cursor:pointer}
.lvl-b{background:var(--glass);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(240,255,0,.2);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--ny);text-shadow:0 0 8px rgba(240,255,0,.3)}
.hdr-sub{font-size:9px;color:#556;padding:0 16px 4px;font-weight:500}
/* bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;display:flex;background:rgba(6,6,14,.9);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--gborder);padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px));z-index:100}
.bnav button{flex:1;border:none;background:none;color:#445;font-size:9px;font-weight:600;cursor:pointer;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .2s}
.bnav button.act{color:var(--cy)}
.bnav .ni{font-size:18px}
.ct{padding:0 14px}
.ct2{font-size:13px;font-weight:700;margin-bottom:8px;color:#aab}
.cr{display:flex;justify-content:space-between;align-items:center}
.dm{font-size:10px;color:var(--dim);margin-top:2px;font-weight:500}
/* quest items */
.qt{font-size:9px;font-weight:700;color:#445;margin:8px 0 4px;display:flex;align-items:center;gap:6px}
.qt .ql{flex:1;height:1px;background:rgba(255,255,255,.05)}
.qi{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid var(--gborder);border-radius:12px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.qi:active{transform:scale(.98)}
.qi.dn{border-color:rgba(0,255,242,.15);background:rgba(0,255,242,.03)}
.qi.dn .qc{background:var(--cy);border-color:var(--cy);color:#000;box-shadow:0 0 10px rgba(0,255,242,.3)}
.qc{width:26px;height:26px;border-radius:7px;border:2px solid #334;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;transition:all .2s}
.qct{flex:1}.qct .t{font-size:12px;font-weight:600}.qct .d{font-size:10px;color:var(--dim);margin-top:1px}
.qe{font-size:20px;flex-shrink:0}
/* ring */
.ds{display:flex;align-items:center;gap:14px;padding:2px 0}
.rw{position:relative;width:66px;height:66px;flex-shrink:0}
.rtx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.rn{font-size:16px;font-weight:800;color:#fff;font-family:monospace}
.rl{font-size:8px;color:var(--dim)}
.dst{flex:1}.dsr{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.dsl{color:#778}.dsv{font-weight:700;font-family:monospace}
/* xp */
.xpbar{background:rgba(255,255,255,.06);border-radius:4px;height:5px;margin-top:5px;overflow:hidden}
.xpfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ny),var(--mg));transition:width .5s;box-shadow:0 0 6px rgba(240,255,0,.3)}
.xplbl{font-size:8px;color:#556;margin-top:2px;text-align:right}
/* menu */
.mc{margin-bottom:4px}
.mct{font-size:11px;font-weight:700;padding:6px 0 3px;color:#889;cursor:pointer;display:flex;justify-content:space-between}
.mct:after{content:"▾";font-size:9px;color:#445}
.mc.op .mct:after{content:"▴"}
.ml{display:none;padding:0 0 2px}.mc.op .ml{display:block}
.mi{font-size:10px;color:#778;padding:3px 10px;line-height:1.6}
.mn{font-size:8px;color:#556}
/* weight */
.bn{font-size:32px;font-weight:800;color:#fff;font-family:monospace;line-height:1}
.sb{text-align:center;flex:1}
.sn{font-size:17px;font-weight:800;color:#fff;font-family:monospace}
.pb{background:rgba(255,255,255,.06);border-radius:5px;height:6px;margin-top:10px;overflow:hidden}
.pf{height:100%;border-radius:5px;transition:width .5s;background:linear-gradient(90deg,var(--cy),var(--eb));box-shadow:0 0 8px rgba(0,255,242,.2)}
.plb{font-size:9px;color:var(--dim);margin-top:4px;text-align:center}
.ir{display:flex;gap:8px;margin-top:8px}
.ir input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--gborder2);border-radius:10px;padding:11px 12px;color:#fff;font-size:15px;font-weight:600;outline:none;font-family:monospace;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.svb{background:linear-gradient(135deg,var(--cy),var(--eb));border:none;border-radius:10px;padding:11px 18px;color:#000;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 0 12px rgba(0,255,242,.2)}
.svh{font-size:10px;color:var(--cy);margin-top:5px;font-weight:500}
.csv{width:100%;max-width:380px;display:block;margin:0 auto}
.ech{text-align:center;color:#445;font-size:11px;padding:20px 0}
/* info row */
.info-r{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.info-r:last-child{border:none}
.info-l{font-size:11px;color:#667}.info-v{font-size:11px;font-weight:700;font-family:monospace}
/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cal-h{font-size:8px;color:#556;text-align:center;font-weight:600;padding:2px 0}
.cal-d{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#334;background:rgba(255,255,255,.02)}
.cal-d.c1{background:rgba(0,255,242,.12);color:var(--cy);box-shadow:inset 0 0 6px rgba(0,255,242,.1)}
.cal-d.c2{background:rgba(240,255,0,.1);color:var(--ny)}
.cal-d.c3{background:rgba(255,45,123,.1);color:var(--np)}
.cal-d.c4{background:rgba(255,255,255,.02);color:#445}
.cal-d.cs{background:rgba(191,0,255,.08);color:var(--nv)}
/* history */
.hl{max-height:350px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hi{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.hd{font-weight:600}.hdy{font-size:9px;color:var(--dim);margin-left:4px;font-family:monospace}
.hic{display:flex;gap:7px;align-items:center}
.hw{font-weight:700;color:var(--cy);font-family:monospace;min-width:44px;text-align:right}
.hn{color:#334;min-width:44px;text-align:right}
.hp{font-weight:700;font-family:monospace;min-width:32px;text-align:right}
/* badges */
.bdg{display:inline-flex;align-items:center;gap:4px;background:var(--glass);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(240,255,0,.15);border-radius:8px;padding:4px 8px;font-size:9px;font-weight:600;color:var(--ny);margin:2px}
.bdg.locked{opacity:.2;filter:grayscale(1);border-color:var(--gborder)}
.bdg-next{font-size:10px;color:#778;padding:8px 0;border-top:1px solid rgba(255,255,255,.04);margin-top:8px}
/* rest day */
.rest{text-align:center;padding:50px 20px}
.rest .re{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(191,0,255,.3))}
.rest .rt{font-size:18px;font-weight:800;color:var(--nv);text-shadow:0 0 15px rgba(191,0,255,.4)}
.rest .rs{font-size:12px;color:#556;line-height:1.8;margin-top:8px}
/* toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--glass2);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(0,255,242,.2);color:var(--cy);padding:6px 18px;border-radius:18px;font-size:12px;z-index:999;font-weight:600;box-shadow:0 0 20px rgba(0,255,242,.15);transition:opacity .3s;pointer-events:none}
.toast.hide{opacity:0}
.rbtn{width:100%;padding:10px;background:var(--glass);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(255,45,123,.15);border-radius:10px;color:var(--np);font-size:11px;font-weight:500;cursor:pointer;margin-top:4px;margin-bottom:10px}
.ebtn{width:100%;padding:10px;background:var(--glass);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(0,255,242,.1);border-radius:10px;color:var(--cy);font-size:11px;cursor:pointer;margin-bottom:5px;opacity:.6}
.streak-b{display:inline-flex;align-items:center;gap:3px;background:rgba(240,255,0,.08);border:1px solid rgba(240,255,0,.2);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--ny);text-shadow:0 0 6px rgba(240,255,0,.3)}
/* overlay */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,6,14,.92);-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* animations */
.anim-char{font-size:64px;animation:bounce 0.6s ease infinite alternate;filter:drop-shadow(0 0 30px rgba(0,255,242,.5))}
@keyframes bounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-20px) scale(1.1)}}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes slideIn{0%{transform:translateX(-100vw)}50%{transform:translateX(10px)}100%{transform:translateX(0)}}
@keyframes disco{0%{transform:rotate(-10deg) scale(1)}25%{transform:rotate(10deg) scale(1.1)}50%{transform:rotate(-10deg) scale(1)}75%{transform:rotate(10deg) scale(1.1)}100%{transform:rotate(-10deg) scale(1)}}
@keyframes drop{0%{transform:translateY(-100vh) rotate(0)}60%{transform:translateY(0) rotate(360deg)}80%{transform:translateY(-30px)}100%{transform:translateY(0)}}
@keyframes fireSpin{0%{transform:rotate(0) scale(.5);opacity:0}50%{transform:rotate(180deg) scale(1.3);opacity:1}100%{transform:rotate(360deg) scale(1);opacity:1}}
@keyframes flyBy{0%{transform:translateX(-100vw) translateY(0)}50%{transform:translateX(0) translateY(-30px)}100%{transform:translateX(100vw) translateY(0)}}
.anim-msg{font-size:22px;font-weight:800;margin-top:12px;background:linear-gradient(90deg,var(--cy),var(--mg),var(--ny));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sparkle{position:absolute;font-size:20px;animation:sparkle 1s ease-out forwards}
@keyframes sparkle{0%{opacity:1;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(0) translateY(-40px)}}
.game-canvas{border-radius:12px;background:rgba(0,0,0,.4);touch-action:none}
.game-hud{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;font-weight:700}
.game-lives{color:var(--np)}.game-score{color:var(--cy)}
.game-over-msg{font-size:13px;color:#778;text-align:center;margin-top:12px;font-style:italic;line-height:1.6}
.game-btn{background:linear-gradient(135deg,var(--cy),var(--eb));border:none;border-radius:12px;padding:14px 32px;color:#000;font-size:16px;font-weight:800;cursor:pointer;margin-top:16px;box-shadow:0 0 25px rgba(0,255,242,.3)}
.game-btn:active{transform:scale(.95)}
/* weekly report */
.wr-box{text-align:center;padding:8px 0}
.wr-grade{font-size:36px;font-weight:800}
.wr-label{font-size:11px;color:#667;margin-top:2px}
</style>
</head>

function td(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function dBtw(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/864e5)}
function fmtD(s){const d=new Date(s+"T00:00:00");return`${d.getMonth()+1}/${d.getDate()}`}
function addD(s,n){const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function dow(s){return new Date(s+"T00:00:00").getDay()}
function isSun(s){return dow(s)===0}

function sdf(date,f,v){if(!data[date])data[date]={};data[date][f]=v;saveD(data);toast((lang==="zh"?"已保存":"저장")+" ✓");render()}
function calcXP(){let xp=0;Object.entries(data).forEach(([k,v])=>{if(v.quests){const dn=Object.values(v.quests).filter(Boolean).length;xp+=dn*10;if(dn===QT&&!isSun(k))xp+=50}});return xp}

function qsDone(d){const e=data[d]||{};return e.quests?Object.values(e.quests).filter(Boolean).length:0}
function getStreak(){if(!cfg)return 0;let s=0,d=new Date(td()+"T00:00:00");while(true){const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;if(ds<cfg.startDate)break;if(isSun(ds)){s++;d.setDate(d.getDate()-1);continue}if(data[ds]&&data[ds].quests&&Object.values(data[ds].quests).filter(Boolean).length>=7){s++;d.setDate(d.getDate()-1)}else break}return s}
function latestW(){const e=Object.entries(data).filter(([,v])=>v.weight).sort((a,b)=>b[0].localeCompare(a[0]));return e.length>0?e[0][1].weight:cfg?cfg.startWeight:0}
function totalStars(){return Object.entries(data).filter(([k,v])=>v.quests&&Object.values(v.quests).filter(Boolean).length===QT&&!isSun(k)).length}
function exSets(){if(!cfg)return 7;const w=Math.floor(dBtw(cfg.startDate,td())/7)+1;if(w<=1)return 7;if(w<=2)return 8;if(w<=4)return 10;return 12}
function getLvl(){let l=0;for(let i=LVLS.length-1;i>=0;i--)if(usr.xp>=LVLS[i]){l=i;break}return l}
function getLN(l){return lang==="zh"?LN_ZH[l]:LN_KO[l]}
function getBMI(){if(!cfg||!cfg.height)return 0;const h=cfg.height/100;return(latestW()/(h*h)).toFixed(1)}
function getWeeklyLoss(){if(!cfg)return 0;const ws=Object.entries(data).filter(([,v])=>v.weight).sort((a,b)=>a[0].localeCompare(b[0]));if(ws.length<2)return 0;const first=ws[0],last=ws[ws.length-1],days=dBtw(first[0],last[0]);if(days<3)return 0;return((first[1].weight-last[1].weight)/days*7).toFixed(1)}
function getPredictDate(){const rate=parseFloat(getWeeklyLoss());if(rate<=0||!cfg)return lang==="zh"?"--":"--";const toGo=latestW()-cfg.targetWeight;if(toGo<=0)return lang==="zh"?"已达标！":"달성!";const weeks=toGo/rate;const days=Math.ceil(weeks*7);return fmtD(addD(td(),days))}
function weeklyRate(){if(!cfg)return 0;const wd=dow(td()),start=addD(td(),-wd);let total=0,done=0;for(let i=0;i<7;i++){const ds=addD(start,i);if(ds>td()||ds<cfg.startDate)continue;if(isSun(ds))continue;total++;if(data[ds]&&data[ds].quests&&Object.values(data[ds].quests).filter(Boolean).length>=7)done++}return total?Math.round(done/total*100):0}
function avgRate(){if(!cfg)return 0;const el=dBtw(cfg.startDate,td());let total=0,done=0;for(let i=0;i<=el;i++){const ds=addD(cfg.startDate,i);if(isSun(ds))continue;total++;if(data[ds]&&data[ds].quests&&Object.values(data[ds].quests).filter(Boolean).length>=7)done++}return total?Math.round(done/total*100):0}

const bmi=getBMI(),wl=getWeeklyLoss(),pred=getPredictDate();
b+=`<div class="gc"><div class="cr"><div><div class="bn glow-cy">${lw}kg</div><div class="dm">${t("current")}</div></div><div style="text-align:right"><div class="bn" style="color:${lost>0?"var(--cy)":"var(--np)"};${lost>0?"text-shadow:0 0 10px rgba(0,255,242,.3)":"text-shadow:0 0 10px rgba(255,45,123,.3)"}">${lost>0?"-":"+"}${Math.abs(lost).toFixed(1)}</div><div class="dm">${t("reduced")}(kg)</div></div></div><div class="pb"><div class="pf" style="width:${pct}%"></div></div><div class="plb">${cfg.startWeight}kg → ${cfg.targetWeight}kg · ${t("toGoal")} ${toGo.toFixed(1)}kg</div></div>`;
// info cards
b+=`<div class="gc"><div class="cr"><div class="sb"><div class="sn" style="color:var(--nv)">${bmi||"--"}</div><div class="dm">${t("bmi")}</div></div><div class="sb"><div class="sn" style="color:var(--ny)">${wl||"--"}kg</div><div class="dm">${t("wkLoss")}</div></div><div class="sb"><div class="sn" style="color:var(--mg)">${pred}</div><div class="dm">${t("predict")}</div></div></div></div>`;
b+=`<div class="gc"><div class="ct2">⚖️ ${t("rec")}</div><div style="font-size:10px;color:#556">${t("recTip")}</div><div class="ir"><input type="number" step="0.1" placeholder="kg" id="wi" value="${tD.weight||""}"/><button class="svb" onclick="saveW()">${t("save")}</button></div>${tD.weight?`<div class="svh">${t("saved").replace("%s",tD.weight)}</div>`:""}</div>`;
b+=`<div class="gc"><div class="ct2">📉 ${t("trend")}</div>${buildChart()}</div>`}
// ═══ HISTORY ═══
if(curView==="history"){
b+=`<div class="gc"><div class="ct2">📆 ${t("cal")}</div>${buildCal()}<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap"><span style="font-size:8px;color:var(--cy)">■ ≥80%</span><span style="font-size:8px;color:var(--ny)">■ ≥50%</span><span style="font-size:8px;color:var(--np)">■ <50%</span><span style="font-size:8px;color:var(--nv)">■ ${lang==="zh"?"周日":"일"}</span></div></div>`;
// weekly report
const wr=weeklyRate();const wg=wr>=80?"S":wr>=60?"A":wr>=40?"B":wr>=20?"C":"D";const wgc=wr>=80?"var(--cy)":wr>=60?"var(--ny)":wr>=40?"var(--o)":"var(--np)";
b+=`<div class="gc"><div class="ct2">📊 ${t("wkReport")}</div><div class="cr"><div class="wr-box"><div class="wr-grade" style="color:${wgc};text-shadow:0 0 15px ${wgc}">${wg}</div><div class="wr-label">${lang==="zh"?"等级":"등급"}</div></div><div class="sb"><div class="sn" style="color:${wgc}">${wr}%</div><div class="dm">${t("wkRate")}</div></div><div class="sb"><div class="sn">${avgRate()}%</div><div class="dm">${t("avgRate")}</div></div></div></div>`;
const days=Math.min(el+1,cfg.totalDays);let h="";
for(let i=0;i<days;i++){const ds=addD(cfg.startDate,el-i),e=data[ds]||{},isT=ds===today2,di=dBtw(cfg.startDate,ds),s2=isSun(ds);const qd=s2?"🌙":e.quests?Object.values(e.quests).filter(Boolean).length+"/"+QT:"0/"+QT;const qp2=s2?100:e.quests?Math.round(Object.values(e.quests).filter(Boolean).length/QT*100):0;const pc=s2?"var(--nv)":qp2>=80?"var(--cy)":qp2>=50?"var(--ny)":"var(--np)";h+=`<div class="hi"><div class="hd">${isT?t("today"):fmtD(ds)}${s2?" 🌙":""}<span class="hdy">D${di+1}</span></div><div class="hic">${e.weight?`<span class="hw">${e.weight}kg</span>`:'<span class="hn">--</span>'}<span class="hp" style="color:${pc}">${qd}</span></div></div>`}
b+=`<div class="gc"><div class="ct2">📋 ${t("histTitle")}</div><div class="hl">${h||`<div class="ech">${t("noData")}</div>`}</div></div>`}
// ═══ STATS ═══
if(curView==="stats"){
b+=`<div class="gc"><div class="cr"><div><div style="font-size:10px;color:#667">${t("level")}</div><div style="font-size:28px;font-weight:800;color:var(--ny);text-shadow:0 0 15px rgba(240,255,0,.3)">Lv.${lvl+1}</div><div style="font-size:12px;font-weight:700;color:var(--mg);text-shadow:0 0 8px rgba(255,0,255,.3)">${getLN(lvl)}</div></div><div style="text-align:right"><div style="font-size:10px;color:#667">${t("xp")}</div><div class="sn" style="color:var(--ny)">${usr.xp}</div><div style="font-size:9px;color:#445">${lang==="zh"?"下一级":"다음"}: ${nxXp}</div></div></div><div class="xpbar" style="margin-top:8px"><div class="xpfill" style="width:${xpP}%"></div></div></div>`;
b+=`<div class="gc"><div class="ct2">${t("stats")}</div><div class="cr"><div class="sb"><div class="sn glow-cy">${totalStars()}</div><div class="dm">⭐ ${t("stars")}</div></div><div class="sb"><div class="sn glow-ny">${streak}</div><div class="dm">🔥 ${t("streak")}</div></div></div><div class="cr" style="margin-top:8px"><div class="sb"><div class="sn" style="color:var(--eb)">${weeklyRate()}%</div><div class="dm">${t("wkRate")}</div></div><div class="sb"><div class="sn" style="color:var(--nv)">${avgRate()}%</div><div class="dm">${t("avgRate")}</div></div></div><div class="cr" style="margin-top:8px"><div class="sb"><div class="sn">${Object.values(data).filter(v=>v.weight).length}</div><div class="dm">${t("recCnt")}</div></div><div class="sb"><div class="sn">${el}</div><div class="dm">${t("elapsed")}</div></div></div></div>`;
b+=`<div class="gc"><div class="ct2">🏅 ${t("badges")}</div><div style="display:flex;flex-wrap:wrap;gap:3px">`;
BDEFS.forEach(bd=>{const u=bd.ck();b+=`<div class="bdg ${u?"":"locked"}">${bd.icon} ${lang==="zh"?bd.zh:bd.ko}</div>`});
b+=`</div><div class="bdg-next">${lang==="zh"?"▸ 下个":"▸ 다음"}: ${nextBadge()}</div></div>`;
b+=`<div class="gc"><div class="ct2">⚙️ ${t("info")}</div><div class="info-r"><span class="info-l">${t("startD")}</span><span class="info-v">${fmtD(cfg.startDate)}</span></div><div class="info-r"><span class="info-l">${t("endD")}</span><span class="info-v">${fmtD(cfg.endDate)}</span></div><div class="info-r"><span class="info-l">${t("curW")}</span><span class="info-v">${cfg.startWeight}kg → ${cfg.targetWeight}kg</span></div><div class="info-r"><span class="info-l">${t("days")}</span><span class="info-v">${cfg.totalDays}${t("day")}</span></div>${cfg.height?`<div class="info-r"><span class="info-l">${t("height")}</span><span class="info-v">${cfg.height}cm</span></div>`:""}</div>`;
b+=`<button class="ebtn" onclick="endC()">${t("end")}</button><button class="rbtn" onclick="resetAll()">${t("reset")}</button>`}
app.innerHTML=`<div class="hdr"><div class="logo">🔥 ${lang==="zh"?"燃脂挑战":"번지 챌린지"}</div><div class="hdr-r"><span class="lvl-b">Lv.${lvl+1} ${getLN(lvl)}</span><button class="lang-btn" onclick="toggleLang()">${lang==="zh"?"한국어":"中文"}</button></div></div><div class="hdr-sub">${cfg.startWeight}kg → ${cfg.targetWeight}kg · ${cfg.totalDays}${t("day")}</div><div class="ct">${b}</div>${nav}`}
function startC(){const sw=parseFloat(document.getElementById("s-sw").value),tw=parseFloat(document.getElementById("s-tw").value),ht=parseInt(document.getElementById("s-ht").value),days=parseInt(document.getElementById("s-d").value);if(!sw||sw<30||sw>300){toast(lang==="zh"?"请输入有效体重":"유효한 체중");return}if(!tw||tw<30||tw>300){toast(lang==="zh"?"请输入有效目标":"유효한 목표");return}if(!ht||ht<100||ht>250){toast(lang==="zh"?"请输入有效身高":"유효한 키");return}if(!days||days<7||days>180){toast("7~180");return}const today2=td();cfg={startWeight:sw,targetWeight:tw,height:ht,totalDays:days,startDate:today2,endDate:addD(today2,days)};saveC(cfg);data={};data[today2]={weight:sw};saveD(data);usr={xp:0};saveU(usr);curView="quest";toast(lang==="zh"?"挑战开始！💪":"도전 시작! 💪");render()}
function saveW(){const v=parseFloat(document.getElementById("wi").value);if(v>30&&v<300)sdf(td(),"weight",v);else toast(lang==="zh"?"请输入有效体重":"유효한 체중")}
function endC(){if(confirm(lang==="zh"?"确定结束？":"종료할까요?")){localStorage.removeItem(CK);localStorage.removeItem(DK);localStorage.removeItem(UK);cfg=null;data={};usr={xp:0};curView="quest";render()}}
function resetAll(){if(confirm(lang==="zh"?"清除所有？不可恢复":"전체 삭제? 복구 불가")){localStorage.removeItem(CK);localStorage.removeItem(DK);localStorage.removeItem(UK);cfg=null;data={};usr={xp:0};curView="quest";render()}}
render();
</script>
</body>
</html>
